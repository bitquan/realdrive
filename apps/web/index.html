<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06080d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>RealDrive | Community-first rides</title>
    <meta
      name="description"
      content="RealDrive is a community-first rides platform for riders, drivers, and operators with transparent pricing, tracking, and dispatch tools."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://realdrive.app/" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RealDrive" />
    <meta property="og:title" content="RealDrive | Community-first rides" />
    <meta
      property="og:description"
      content="Book rides, track trips, and connect drivers with transparent community operations."
    />
    <meta property="og:url" content="https://realdrive.app/" />
    <meta property="og:image" content="https://realdrive-web.vercel.app/logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RealDrive | Community-first rides" />
    <meta
      name="twitter:description"
      content="Book rides, track trips, and connect drivers with transparent community operations."
    />
    <meta name="twitter:image" content="https://realdrive-web.vercel.app/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(90, 124, 255, 0.14), transparent 24%),
          radial-gradient(circle at 82% -8%, rgba(65, 89, 155, 0.18), transparent 28%),
          linear-gradient(180deg, #06080d 0%, #05070b 100%);
        color: #f2f5fb;
        font-family: "Sora", ui-sans-serif, system-ui;
      }

      #root {
        min-height: 100vh;
      }

      .boot-shell {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .boot-card {
        width: min(100%, 420px);
        border: 1px solid rgba(154, 163, 178, 0.18);
        border-radius: 32px;
        background: linear-gradient(180deg, rgba(17, 21, 29, 0.96), rgba(11, 14, 20, 0.96));
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
        padding: 28px 24px;
      }

      .boot-eyebrow {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(201, 208, 224, 0.72);
      }

      .boot-logo {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        object-fit: cover;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      }

      .boot-title {
        margin: 14px 0 0;
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .boot-copy {
        margin: 12px 0 0;
        line-height: 1.6;
        color: rgba(201, 208, 224, 0.76);
      }

      .boot-status {
        margin-top: 18px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 999px;
        border: 1px solid rgba(154, 163, 178, 0.18);
        background: rgba(12, 15, 21, 0.82);
        padding: 10px 14px;
        font-size: 13px;
        color: rgba(228, 233, 244, 0.88);
      }

      .boot-status[data-state="warning"] {
        border-color: rgba(245, 158, 11, 0.28);
        background: rgba(39, 27, 12, 0.82);
      }

      .boot-status[data-state="error"] {
        border-color: rgba(248, 113, 113, 0.28);
        background: rgba(41, 19, 22, 0.82);
      }

      .boot-pulse {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #7192ff;
        box-shadow: 0 0 0 0 rgba(113, 146, 255, 0.5);
        animation: boot-pulse 1.6s infinite;
      }

      .boot-status[data-state="warning"] .boot-pulse {
        background: #f59e0b;
        box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.5);
      }

      .boot-status[data-state="error"] .boot-pulse {
        background: #f87171;
        box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.45);
      }

      .boot-actions {
        display: none;
        margin-top: 18px;
        gap: 10px;
        flex-wrap: wrap;
      }

      .boot-actions[data-visible="true"] {
        display: flex;
      }

      .boot-button {
        height: 42px;
        border: 1px solid rgba(154, 163, 178, 0.18);
        border-radius: 999px;
        background: rgba(12, 15, 21, 0.82);
        color: #f2f5fb;
        padding: 0 16px;
        font: inherit;
        font-size: 14px;
        font-weight: 600;
      }

      .boot-button--primary {
        border-color: rgba(113, 146, 255, 0.35);
        background: rgba(113, 146, 255, 0.14);
      }

      .boot-help {
        display: none;
        margin-top: 14px;
        font-size: 13px;
        line-height: 1.6;
        color: rgba(201, 208, 224, 0.7);
      }

      .boot-help[data-visible="true"] {
        display: block;
      }

      @keyframes boot-pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(113, 146, 255, 0.5);
        }

        70% {
          box-shadow: 0 0 0 12px rgba(113, 146, 255, 0);
        }

        100% {
          box-shadow: 0 0 0 0 rgba(113, 146, 255, 0);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell">
        <div class="boot-card">
          <div class="boot-eyebrow"><img class="boot-logo" src="/logo.png" alt="RealDrive logo" /> <span>RealDrive</span></div>
          <h1 class="boot-title">Loading control center</h1>
          <p class="boot-copy">Preparing the rider, driver, and admin workspace for this device.</p>
          <div class="boot-status" id="boot-status" data-state="loading">
            <span class="boot-pulse"></span>
            <span id="boot-status-text">Starting app…</span>
          </div>
          <div class="boot-actions" id="boot-actions" data-visible="false">
            <button class="boot-button boot-button--primary" type="button" id="boot-reload">Reload app</button>
            <button class="boot-button" type="button" id="boot-home">Open home</button>
          </div>
          <p class="boot-help" id="boot-help" data-visible="false">
            If this keeps happening, try reloading once or reopening the page without content blockers enabled.
          </p>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var status = document.getElementById('boot-status');
        var statusText = document.getElementById('boot-status-text');
        var actions = document.getElementById('boot-actions');
        var help = document.getElementById('boot-help');
        var reloadButton = document.getElementById('boot-reload');
        var homeButton = document.getElementById('boot-home');
        var booted = false;

        function showRecovery(state, message) {
          if (!status || !statusText || !actions || !help) {
            return;
          }

          status.setAttribute('data-state', state);
          statusText.textContent = message;
          actions.setAttribute('data-visible', 'true');
          help.setAttribute('data-visible', 'true');
        }

        window.__REALDRIVE_MARK_BOOTED__ = function () {
          booted = true;
        };

        window.addEventListener('error', function () {
          if (!booted) {
            showRecovery('error', 'App startup failed on this device.');
          }
        });

        window.addEventListener('unhandledrejection', function () {
          if (!booted) {
            showRecovery('error', 'App startup failed on this device.');
          }
        });

        window.setTimeout(function () {
          if (!booted) {
            showRecovery('warning', 'Still loading. Try reloading.');
          }
        }, 8000);

        if (reloadButton) {
          reloadButton.addEventListener('click', function () {
            window.location.reload();
          });
        }

        if (homeButton) {
          homeButton.addEventListener('click', function () {
            window.location.href = '/';
          });
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
