<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RealDrive | Community-first rides</title>
    <meta
      name="description"
      content="RealDrive is a community-first rides platform for riders, drivers, and operators with transparent pricing, tracking, and dispatch tools."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://realdrive.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RealDrive" />
    <meta property="og:title" content="RealDrive | Community-first rides" />
    <meta
      property="og:description"
      content="Book rides, track trips, and connect drivers with transparent community operations."
    />
    <meta property="og:url" content="https://realdrive.app/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RealDrive | Community-first rides" />
    <meta
      name="twitter:description"
      content="Book rides, track trips, and connect drivers with transparent community operations."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(90, 124, 255, 0.14), transparent 24%),
          radial-gradient(circle at 82% -8%, rgba(65, 89, 155, 0.18), transparent 28%),
          linear-gradient(180deg, #06080d 0%, #05070b 100%);
        color: #f2f5fb;
        font-family: "Sora", ui-sans-serif, system-ui;
      }

      #root {
        min-height: 100vh;
      }

      .boot-shell {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .boot-card {
        width: min(100%, 420px);
        border: 1px solid rgba(154, 163, 178, 0.18);
        border-radius: 32px;
        background: linear-gradient(180deg, rgba(17, 21, 29, 0.96), rgba(11, 14, 20, 0.96));
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
        padding: 28px 24px;
      }

      .boot-eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(201, 208, 224, 0.72);
      }

      .boot-title {
        margin: 14px 0 0;
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .boot-copy {
        margin: 12px 0 0;
        line-height: 1.6;
        color: rgba(201, 208, 224, 0.76);
      }

      .boot-status {
        margin-top: 18px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 999px;
        border: 1px solid rgba(154, 163, 178, 0.18);
        background: rgba(12, 15, 21, 0.82);
        padding: 10px 14px;
        font-size: 13px;
        color: rgba(228, 233, 244, 0.88);
      }

      .boot-pulse {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #7192ff;
        box-shadow: 0 0 0 0 rgba(113, 146, 255, 0.5);
        animation: boot-pulse 1.6s infinite;
      }

      @keyframes boot-pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(113, 146, 255, 0.5);
        }

        70% {
          box-shadow: 0 0 0 12px rgba(113, 146, 255, 0);
        }

        100% {
          box-shadow: 0 0 0 0 rgba(113, 146, 255, 0);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell">
        <div class="boot-card">
          <div class="boot-eyebrow">RealDrive</div>
          <h1 class="boot-title">Loading control center</h1>
          <p class="boot-copy">Preparing the rider, driver, and admin workspace for this device.</p>
          <div class="boot-status">
            <span class="boot-pulse"></span>
            Starting app…
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
